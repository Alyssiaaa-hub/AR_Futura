<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Futura AR</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; background: black; }
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        font-family: sans-serif;
      }
      #start-screen h1 {
        font-size: 28px;
        margin-bottom: 40px;
        letter-spacing: 4px;
      }
      #start-btn {
        background: white;
        color: black;
        border: none;
        padding: 16px 40px;
        font-size: 16px;
        letter-spacing: 2px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <h1>FUTURA</h1>
      <button id="start-btn">DÉMARRER</button>
    </div>
    <a-scene
      mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="futura-video"
          src="anim.mp4"
          preload="auto"
          loop="false"
          crossorigin="anonymous"
          playsinline
          muted
          webkit-playsinline
        ></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#futura-video"
          position="0 0 0"
          width="1"
          height="1.414"
          rotation="0 0 0"
          material="shader: flat"
          video-autoplay
        ></a-video>
      </a-entity>
    </a-scene>
    <script>
      const video = document.querySelector("#futura-video");
      const startBtn = document.querySelector("#start-btn");
      const startScreen = document.querySelector("#start-screen");
      const sceneEl = document.querySelector("a-scene");

      startBtn.addEventListener("click", () => {
        navigator.mediaDevices.getUserMedia({ video: true })
          .then(() => {
            video.muted = true;
            video.load();
            startScreen.style.display = "none";
            sceneEl.components["mindar-image"].start();
          })
          .catch(e => {
            alert("Accès à la caméra refusé. Autorise la caméra dans les paramètres.");
