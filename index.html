<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Futura AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Trebuchet MS', sans-serif; }

    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000;
      z-index: 999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.6s ease-out;
    }

    canvas#stars {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1000; pointer-events: none;
    }

    #overlay-inner {
      position: relative;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      width: 100%;
      text-align: center;
    }

    #title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #title-block .label {
      color: #555;
      font-size: 0.65rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
      width: 100%;
    }

    #title-block h1 {
      color: #fff;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 14px;
      text-transform: uppercase;
      margin: 0;
      line-height: 1;
      text-align: center;
      width: 100%;
    }

    #title-block .subtitle {
      color: #444;
      font-size: 0.6rem;
      letter-spacing: 4px;
      margin-top: 10px;
      text-align: center;
      width: 100%;
    }

    #status {
      color: #555;
      font-size: 0.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      min-height: 16px;
      width: 100%;
    }

    #start-btn {
      position: relative;
      padding: 16px 52px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: 1px solid #444;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.3s, color 0.3s;
      display: none;
    }

    #start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #fff;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
      z-index: 0;
    }

    #start-btn:hover::before { transform: scaleX(1); }
    #start-btn:hover { color: #000; border-color: #fff; }
    #start-btn span { position: relative; z-index: 1; }

    #btn-sub {
      color: #444;
      font-size: 0.55rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: -24px;
      text-align: center;
    }

    #line-top, #line-bottom {
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, transparent, #333);
    }
    #line-bottom {
      background: linear-gradient(to top, transparent, #333);
    }

    .hidden { opacity: 0; pointer-events: none; }
  </style>

  <script>
    AFRAME.registerShader('chromakey', {
      schema: {
        src: {type: 'map', is: 'uniform'},
        color: {default: {x: 0.1, y: 0.9, z: 0.2}, type: 'vec3', is: 'uniform'},
        transparent: {default: true, is: 'uniform'}
      },
      init: function (data) {
        var videoTexture = new THREE.VideoTexture(data.src);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.format = THREE.RGBAFormat;
        this.material = new THREE.ShaderMaterial({
          uniforms: {
            color: { type: 'c', value: new THREE.Color(data.color.x, data.color.y, data.color.z) },
            src: { type: 't', value: videoTexture }
          },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            precision mediump float;
            uniform vec3 color;
            uniform sampler2D src;
            varying vec2 vUv;
            void main() {
              vec4 tex = texture2D(src, vUv);
              float alpha = (length(tex.rgb - color) - 0.5) * 7.0;
              gl_FragColor = vec4(tex.rgb, alpha);
            }
          `,
          transparent: data.transparent,
          side: THREE.FrontSide
        });
      },
      update: function (data) {
        this.material.uniforms.color.value.setRGB(data.color.x, data.color.y, data.color.z);
      }
    });

    AFRAME.registerComponent('smart-target', {
      init: function() {
        const el = this.el;
        this.video = el.dataset.videoId ? document.getElementById(el.dataset.videoId) : null;
        el.addEventListener('targetFound', () => {
          if (this.video) { this.video.style.display = 'block'; this.video.play(); }
        });
        el.addEventListener('targetLost', () => {
          if (this.video) this.video.pause();
        });
      }
    });
  </script>
</head>
<body>

  <div id="overlay">
    <div id="overlay-inner">
      <div id="line-top"></div>
      <div id="title-block">
        <div class="label">Augmented experience | Expérience augmentée</div>
        <h1>Futura</h1>
        <div class="subtitle">1927 — Paul Renner</div>
      </div>
      <div id="status">Initialisation...</div>
      <button id="start-btn"><span>Scan | Scanner</span></button>
      <div id="btn-sub">Point your camera at the poster | Pointez vers l'affiche</div>
      <div id="line-bottom"></div>
    </div>
  </div>

  <canvas id="stars"></canvas>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; maxTrack: 1;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: false; antialias: false; precision: mediump;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets id="assets-loader" timeout="10000"></a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
    <a-entity id="targets-container"></a-entity>
  </a-scene>

  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < 80; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 0.8 + 0.2,
          alpha: Math.random(),
          speed: Math.random() * 0.003 + 0.001
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.alpha += s.speed;
        if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha * 0.4})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    resizeCanvas();
    initStars();
    drawStars();
    window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

    const assetsContainer = document.getElementById('assets-loader');
    const targetsContainer = document.getElementById('targets-container');
    const startBtn = document.getElementById('start-btn');
    const statusText = document.getElementById('status');

    async function initExperience() {
      const video = document.createElement('video');
      video.id = 'video-0';
      video.src = './assets/0.mp4';
      video.setAttribute('preload', 'auto');
      video.setAttribute('loop', 'true');
      video.setAttribute('crossorigin', 'anonymous');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.muted = true;
      video.setAttribute('muted', '');
      assetsContainer.appendChild(video);

      const targetEl = document.createElement('a-entity');
      targetEl.setAttribute('mindar-image-target', 'targetIndex: 0');
      targetEl.dataset.videoId = 'video-0';

      const videoPlane = document.createElement('a-entity');
      videoPlane.setAttribute('geometry', 'primitive: plane; width: 1; height: 1.414');
      videoPlane.setAttribute('position', '0 0 0');
      videoPlane.setAttribute('material', 'shader: chromakey; src: #video-0; color: 0 1 0; transparent: true');
      targetEl.appendChild(videoPlane);

      video.addEventListener('loadedmetadata', () => {
        const newHeight = video.videoHeight / video.videoWidth;
        videoPlane.setAttribute('geometry', {primitive: 'plane', width: 1, height: newHeight});
      }, { once: true });

      targetEl.setAttribute('smart-target', '');
      targetsContainer.appendChild(targetEl);

      statusText.innerText = "Ready | Prêt";
      startBtn.style.display = 'block';
    }

    initExperience();

    startBtn.addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      const vids = document.querySelectorAll('video');
      vids.forEach(v => {
        const p = v.play();
        if (p !== undefined) p.then(() => v.pause()).catch(e => console.error(e));
      });
      const arSys = document.querySelector('a-scene').systems['mindar-image-system'];
      if (arSys) arSys.start();
    });
  </script>
</body>
</html>
