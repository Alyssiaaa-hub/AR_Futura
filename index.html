<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Futura AR</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; }
      #play-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: white;
        border: none;
        padding: 14px 32px;
        font-size: 18px;
        border-radius: 30px;
        display: none;
      }
    </style>
  </head>
  <body>
    <button id="play-btn">▶ Lancer</button>
    <a-scene
      mindar-image="imageTargetSrc: targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="futura-video"
          src="futura_anim.mp4"
          preload="auto"
          loop="false"
          crossorigin="anonymous"
          playsinline
          muted
          webkit-playsinline
        ></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#futura-video"
          position="0 0 0"
          width="1"
          height="1.414"
          rotation="0 0 0"
          material="shader: flat"
          video-autoplay
        ></a-video>
      </a-entity>
    </a-scene>
    <script>
      const video = document.querySelector("#futura-video");
      const btn = document.querySelector("#play-btn");

      btn.addEventListener("click", () => {
        video.play();
        btn.style.display = "none";
      });

      AFRAME.registerComponent("video-autoplay", {
        init: function () {
          this.el.addEventListener("targetFound", () => {
            video.currentTime = 0;
            video.muted = true;
            video.play().catch(() => {
              btn.style.display = "block";
            });
          });
          this.el.addEventListener("targetLost", () => {
            video.pause();
            btn.style.display = "none";
          });
        },
      });
    </script>
  </body>
</html>
